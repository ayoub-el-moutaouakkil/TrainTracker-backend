spring.application.name=TrainTracker
server.port=${PORT:8080}

# GTFS statique SNCF (horaires + gares)
gtfs.static.url=${GTFS_STATIC_URL:https://eu.ftp.opendatasoft.com/sncf/plandata/Export_OpenData_SNCF_GTFS_NewTripId.zip}

# GTFS-RT SNCF (retards temps réel)
gtfs.rt.url=${GTFS_RT_URL:https://proxy.transport.data.gouv.fr/resource/sncf-gtfs-rt-trip-updates}

# Rafraichissement automatique toutes les 2 minutes
tracking.refresh.rate-ms=${TRACKING_REFRESH_RATE_MS:120000}
